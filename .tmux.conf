# ---- Prefix ----
# Keeping tmux's default Ctrl-b. (To remap later: `unbind C-b; set -g prefix C-a; bind C-a send-prefix`)
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix          # press Ctrl-a twice to send a literal Ctrl-a

# ---- Sane defaults ----
set -g mouse on               # click panes/windows, drag borders, scroll
set -g base-index 1           # windows start at 1 (matches your top-row keys)
setw -g pane-base-index 1
set -g renumber-windows on    # close window 2, window 3 becomes 2
set -g history-limit 50000
set -g escape-time 10         # snappier vim
set -g focus-events on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ---- Claude Code compatibility ----
# Per https://code.claude.com/docs/en/terminal-config#configure-tmux
# allow-passthrough: lets Claude Code's notifications/progress updates reach the outer terminal.
# extended-keys + terminal-features: let tmux distinguish Shift+Enter from plain Enter, so
# Shift+Enter inserts a newline in Claude Code instead of submitting.
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# The chalk-level downgrade workaround for Claude Code (CLAUDE_CODE_TMUX_TRUECOLOR=1)
# lives in install.sh, not here: tmux's `set-environment -g` only seeds env for new
# sessions, not panes opened in existing ones, and Claude reads the var at module load.
# install.sh writes the export to ~/.zshenv. See claude-code issue #36785.

# ---- Vim-style ----
setw -g mode-keys vi          # vim keys in copy mode
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- Window navigation ----
# Alt+h/j and Alt+l/k cycle windows without the prefix. Requires the terminal to send Option as Alt
# (Ghostty: `macos-option-as-alt = true`; iTerm2: Profile -> Keys -> Left/Right Option = Esc+).
bind -n M-h previous-window
bind -n M-j previous-window
bind -n M-l next-window
bind -n M-k next-window

# ---- Split panes ----
bind | split-window -h -c "#{pane_current_path}"  # <prefix> | splits pane vertically
bind - split-window -v -c "#{pane_current_path}"  # <prefix> - splits pane horizontally
bind c new-window -c "#{pane_current_path}"       # <prefix> c opens a new window in current path (default opens in session start dir)
unbind '"'
unbind %

# Prevent tmux from auto-copying and jumping to the prompt when releasing a mouse drag.
# Selection stays visible for reading/pairing; press `y` in copy mode to yank explicitly.
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode    MouseDragEnd1Pane

# ---- Reload config quickly ----
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ---- recon (Claude Code agent dashboard) ----
# https://github.com/gavraz/recon - lists every Claude session running across tmux,
# with status (working/input-needed/idle), context usage, and quick switch/kill.
# `a` for "agents". Avoids `prefix g`, which Claude Code's TUI intercepts as a
# long-form input shortcut even with tmux's prefix in front.
# Requires the `recon` binary on $PATH (install.sh installs it via cargo).
bind a display-popup -E -w 80% -h 60% "recon"

# ---- Copy-mode (vim-style selection; tmux-yank handles cross-platform clipboard) ----
bind -T copy-mode-vi v send -X begin-selection

# ---- Smooth scrolling ----
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# ---- Theme ----
# Catppuccin flavour must be set BEFORE the plugin loads, otherwise the theme falls back to default.
# Options: mocha, latte, frappe, macchiato
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_status_background '#000000'   # 'none' = transparent (inherits terminal bg); hex for a fixed color
# 'no' inserts a terminal-bg reset between status modules so the trailing space in
# status_right_separator is visible (gap between session/windows, directory/gitmux).
# Default 'yes' makes adjacent modules look connected with no gap.
set -g @catppuccin_status_connect_separator 'no'

# Status bar layout: session on the left, directory + git branch on the right.
# Window list stays in the middle (tmux default placement).
# The gitmux module needs the external `arl/gitmux` binary (see README); it renders empty if missing.
set -g status-left-length 100
set -g status-right-length 100
set -g @catppuccin_directory_color "#{E:@thm_pink}"    # override default rosewater; other pinkish picks: flamingo, maroon
set -g @catppuccin_gitmux_color "#{E:@thm_lavender}"   # override default teal; other blueish picks: blue, sapphire, sky
# Catppuccin defaults the window label to #T (pane title), which the shell sets to the hostname
# via terminal escape sequences and which `prefix ,` (rename-window) does not touch. Use #W so the
# rename actually shows up in the status bar.
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g status-left  "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_gitmux}"

# ---- Plugins (TPM) ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'       # fix tmux quirks with sensible settings
set -g @plugin 'tmux-plugins/tmux-resurrect'      # save/restore: <p> Ctrl-s / <p> Ctrl-r
set -g @plugin 'tmux-plugins/tmux-continuum'      # auto-save every 15 min, auto-restore on start
set -g @plugin 'tmux-plugins/tmux-yank'           # cross-platform clipboard yank/paste
# set -g @plugin 'sainnhe/tmux-fzf'               # fuzzy switcher: <p> F
set -g @plugin 'christoomey/vim-tmux-navigator'   # Ctrl-h/j/k/l between vim splits and tmux panes
set -g @plugin 'catppuccin/tmux'                  # Catppuccin theme

# Yank tweaks to keep selection visible after copy:
set -g @yank_action 'copy-pipe-and-cancel'        # exit copy mode after yanking (default)
set -g @yank_with_mouse 'off'                     # don't auto-yank on mouse drag-release; use `y` in copy mode

# Continuum: auto-restore last session on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Resurrect: also restore pane contents and running programs (vim, claude, etc.)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# Keep this LAST:
run '~/.tmux/plugins/tpm/tpm'
